# zones_config_path — путь до JSON с полигонами для конкретной камеры.
# Если не указан или файл отсутствует — сценарии "долго на АЗС" и "машина
# долго у колонки" работают на full-frame; person_in_forbidden и
# person_without_car_at_column тогда не стреляют (для них нужны зоны).
streams:
  - station_code: AZS-001
    camera_code: CAM-167
    rtsp_url: rtsp://admin:admin@172.20.36.167:554/live/sub
    enabled: true
    zones_config_path: /app/config/zones/CAM-167.json

